services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statuspulse-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    networks:
      - statuspulse-network

  postgres:
    image: postgres:15-alpine
    container_name: statuspulse-postgres
    environment:
      POSTGRES_DB: statuspulse
      POSTGRES_USER: statuspulse
      POSTGRES_PASSWORD: supersecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statuspulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks:
      - statuspulse-network

  redis:
    image: redis:7-alpine
    container_name: statuspulse-redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    networks:
      - statuspulse-network

  caddy:
    image: caddy:2-alpine
    container_name: statuspulse-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app
    networks:
      - statuspulse-network

  prometheus:
    image: prom/prometheus
    container_name: statuspulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - statuspulse-network

  grafana:
    image: grafana/grafana
    container_name: statuspulse-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - statuspulse-network

  node-exporter:
    image: prom/node-exporter
    container_name: statuspulse-node-exporter
    ports:
      - "9100:9100"
    networks:
      - statuspulse-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: statuspulse-cadvisor
    ports:
      - "8080:8080"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - statuspulse-network

  uptime-kuma:
    image: louislam/uptime-kuma
    container_name: statuspulse-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - statuspulse-network

volumes:
  postgres_data:
  grafana_data:
  uptime_kuma_data:

networks:
  statuspulse-network:
    driver: bridge
